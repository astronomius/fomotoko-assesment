version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: online-store-app
    volumes:
      - .:/workspace
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=postgres
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - PHP_CLI_SERVER_WORKERS=50
    depends_on:
      - db
    networks:
      - dev-network

  db:
    image: postgres:15-alpine
    container_name: online-store-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - dev-network

volumes:
  pgdata:

networks:
  dev-network:
    external: true
